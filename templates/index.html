<!-- templates/index.html -->

<!DOCTYPE html>
<html>
<head>
    <title>String Matching</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

<link rel="icon" href="{{ url_for('static', filename='icon.png') }}">

<meta name="theme-color" content="#0d6efd">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/service-worker.js')
    .then(function() {
        console.log("Service Worker Registered");
    });
}
</script>
<body>

    <h2>String Matching Using User Input</h2>

    <form method="POST">

        <label>Enter Text:</label><br>
        <input type="text" name="text" required><br><br>

        <label>Enter Pattern:</label><br>
        <input type="text" name="pattern" required><br><br>

        <button type="submit">Find Pattern</button>

    </form>

    {% if result != "" %}
        <h3>Pattern Found At Index: {{ result }}</h3>
        <h3>Execution Time: {{ execution_time }} seconds</h3>
    {% endif %}

</body>
</html>
